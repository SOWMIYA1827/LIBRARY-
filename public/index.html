<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management Login</title>

    <style>
         :root {
            --gold: #c9a84c;
            --dark: #1a1208;
            --cream: #fdf6e3;
            --brown: #5c3d1e;
            --glass: rgba(253, 246, 227, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

         body {
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .container {
              position :relative;
              align-items: center;
              z-index: 1;
              gap:28px;
              width: 25%;
              padding-top: 0px;
              margin-top: 0px;
        }
        .brand {
            text-align: center;
            animation: fadeDown 0.7s ease both;
        }
        .brand-tag {
            font-family: 'lato' ,sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: white;
        }
        .brand h1 {
            font-family: 'playfair Display' , serif;
            font-size: 25px;
            color: white;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }
        .brand-line{
            display: flex;
            align-items: center;
            gap:12 px;
            justify-content: center;
            margin-top: 10px;
            color: white;
        }
        .brand-line em {
            color: white;
        }
        .card{
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(18px);
            border:1px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            animation: fadeUP 0.7s 0.2s ease both;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-title {
            font-family:'Playfair Display' ,serif;
            color: white;
            font-size: 22px;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        .field{
            margin-bottom: 18px;
        }
        .field label{
            display:block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
            margin-bottom: 7px;
        }
        .field input{
            width : 100%;
            background: rgba(255,255,255,0.2);
            border:1px solid rgba(201,168,76,0.3);
            border-radius: 5px;
            padding: 11px 14px;
            color: white;
            font-family: 'Lato', sans-serif;
            font-size: 12px;
        }

        .field input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .field input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn-login {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background-color: #c9a84c;
            border: none;
            border-radius: 5px;
            font-family: 'Lato',sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.15s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(216, 185, 98, 0.3);
        }

        .btn-login:hover {
            background: #e0b95a;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(201,168,76,0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .error-msg {
            display: none;
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(200,60,60,0.5);
            color: #ff6b6b;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 5px;
            margin-top: 12px;
            text-align: center;
        }

        .success-msg {
            display: none;
            background: rgba(0,255,0,0.1);
            border: 1px solid rgba(60,200,60,0.5);
            color: #6bff6b;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 5px;
            margin-top: 12px;
            text-align: center;
        }

          @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
   </style>
</head>

<body>

<div class="container">

    <div class="brand">
        <p class="brand-tag">Est. 1952 Knowledge is Power</p>
        <h1>Central Library</h1>
        <div class="brand-line">
            <span></span>
            <em>Administration Portal</em>
            <span></span>
        </div>
    </div>
    <br><br><br>
    <div class="card">
        <p class="card-title">Sign In</p>

        <div class="field">
            <label>Username:</label>
            <input type="text" id="name" placeholder="Enter your username">
        </div>

        <div class="field">
            <label>Email:</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="field">
            <label>Password:</label>
            <input type="password" id="pass" placeholder="Enter your password">
        </div>

        <button class="btn-login" onclick="login()">Login</button>
        <div class="error-msg" id="errMsg"></div>
        <div class="success-msg" id="successMsg"></div>
    </div>
</div>

<script>
// API Configuration - Point to your Node.js server
const API_BASE = window.location.origin;;// Update this path if your server is running on a different port or path

async function login() {
    const username = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value.trim();
    const errDiv = document.getElementById("errMsg");
    const successDiv = document.getElementById("successMsg");

    // Hide previous messages
    errDiv.style.display = "none";
    successDiv.style.display = "none";

    // Validation
    if (!username) { showErr("Please enter your username"); return; }
    if (!email) { showErr("Please enter your email"); return; }
    if (!password) { showErr("Please enter your password"); return; }

    // Disable button and show loading state
    const loginBtn = document.querySelector(".btn-login");
    const originalText = loginBtn.textContent;
    loginBtn.textContent = "Logging in...";
    loginBtn.disabled = true;

    try {
        // Send login request to backend
        const response = await fetch(`${API_BASE}/api/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (data.success) {
            // Store user data in localStorage
            localStorage.setItem("username", data.user.name);
            localStorage.setItem("email", data.user.email);
            localStorage.setItem("user_id", data.user.id);
            localStorage.setItem("user_type", data.user.type);
            localStorage.setItem("expiry", data.user.expiry);
            
            // Show success message
            showSuccess("Login successful! Redirecting to dashboard...");
            
            // Redirect to dashboard after short delay
            setTimeout(() => {
                window.location.href = "user.html";
            }, 1000);
        } else {
            showErr(data.message || "Login failed. Please check your credentials.");
        }
    } catch (error) {
        console.error("Login error:", error);
        showErr("Connection error. Please make sure the server is running on port 3000");
    } finally {
        // Re-enable button
        loginBtn.textContent = originalText;
        loginBtn.disabled = false;
    }
}

function showErr(msg) {
    const errDiv = document.getElementById("errMsg");
    errDiv.textContent = msg;
    errDiv.style.display = "block";
    
    // Auto hide after 3 seconds
    setTimeout(() => {
        errDiv.style.display = "none";
    }, 3000);
}

function showSuccess(msg) {
    const successDiv = document.getElementById("successMsg");
    successDiv.textContent = msg;
    successDiv.style.display = "block";
}


// Add Enter key support
document.getElementById("pass").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        login();
    }
});
</script>
</body>
</html>
